name: Extract ESPN Ducks

on:
  workflow_dispatch:

jobs:
  extract-ducks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Run ducks extractor
        run: |
          Rscript extract_ducks.R

      - name: Upload CSV outputs
        uses: actions/upload-artifact@v4
        with:
          name: espn-ducks-output
          path: output/*.csv