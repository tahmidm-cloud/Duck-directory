name: Extract ESPN Maidens

on:
  workflow_dispatch:

jobs:
  extract-maidens:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    strategy:
      fail-fast: false
      matrix:
        include:
          - format: test
            class_id: 1
          - format: odi
            class_id: 2
          - format: t20i
            class_id: 3
          - format: t20
            class_id: 6

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl libxml2-dev

      - name: Run maidens extractor
        env:
          FORMAT: ${{ matrix.format }}
          CLASS_ID: ${{ matrix.class_id }}
        run: |
          Rscript extract_ducks.R

      - name: Upload CSV outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: espn-maidens-${{ matrix.format }}
          path: output/*.csv
          if-no-files-found: warn